workflows:
  ios-app:
    name: Khandan iOS App
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: khandan-appstore
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_STORE_APP_ID: 'com.khandan.telegraph'
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    working_directory: mobile
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install iOS Pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist ios/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - khhandantelegraph@gmail.com
        notify:
          success: true
          failure: true
