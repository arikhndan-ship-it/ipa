workflows:
  ios-app:
    name: Khandan iOS App
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: khandan-appstore
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_STORE_APP_ID: 'com.khandan.telegraph'
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    working_directory: mobile
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install iOS Pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
      - name: Flutter build iOS
        script: flutter build ios --release --no-codesign
      - name: Build IPA with xcodebuild
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration release \
            -archivePath $CM_BUILD_DIR/Runner.xcarchive \
            -allowProvisioningUpdates \
            archive
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/Runner.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -exportOptionsPlist $CM_BUILD_DIR/mobile/ios/export_options.plist \
            -allowProvisioningUpdates
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/**/Runner.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - khhandantelegraph@gmail.com
        notify:
          success: true
          failure: true
