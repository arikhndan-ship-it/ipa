name: khandan_app
description: "Khandan News Platform - Flutter Mobile App"
publish_to: 'none'
version: 0.0.3+5

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  cached_network_image: ^3.4.1
  share_plus: ^13.2.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.0
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-en.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/logo-en.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo-en.png
    - assets/images/logo-ckb.png

  generate: true
